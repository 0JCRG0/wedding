<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juan Carlos & Maddy — Wedding</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      color: #3a3a3a;
      background: #faf9f6;
    }

    header {
      text-align: center;
      padding: 4rem 1rem 2rem;
      background: linear-gradient(180deg, #f5f0eb 0%, #faf9f6 100%);
    }

    header h1 {
      font-size: 2.8rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: #2c2c2c;
    }

    header .ampersand {
      display: block;
      font-size: 1.6rem;
      color: #b08d6e;
      margin: 0.3rem 0;
    }

    header p {
      margin-top: 1rem;
      font-size: 1.1rem;
      color: #777;
      font-style: italic;
    }

    section {
      max-width: 700px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    section h2 {
      font-size: 1.5rem;
      font-weight: 400;
      color: #2c2c2c;
      margin-bottom: 1.5rem;
      text-align: center;
      letter-spacing: 0.03em;
    }

    .views {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .views a {
      display: block;
      text-decoration: none;
      padding: 1.2rem 1.5rem;
      border: 1px solid #e8e3dd;
      border-radius: 8px;
      background: #fff;
      color: #3a3a3a;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .views a:hover {
      border-color: #b08d6e;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .views a strong {
      display: block;
      font-size: 1.05rem;
      color: #2c2c2c;
      margin-bottom: 0.3rem;
    }

    .views a span {
      font-size: 0.9rem;
      color: #888;
    }

    footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.85rem;
      color: #aaa;
      border-top: 1px solid #e8e3dd;
    }
  </style>
</head>
<body>

  <header>
    <h1>
      Juan Carlos
      <span class="ampersand">&</span>
      Maddy
    </h1>
    <p>We're getting married!</p>
  </header>

  <section>
    <h2>Table Assignments</h2>
    <div class="views">
      <a href="data/tables_guest_type.html">
        <strong>Guest Type</strong>
        <span>Primary guests vs plus ones</span>
      </a>
      <a href="data/tables_entry.html">
        <strong>Entries</strong>
        <span>Burrata, Terrina de salmones, Kids</span>
      </a>
      <a href="data/tables_main_course.html">
        <strong>Main Courses</strong>
        <span>Filete de res, Salmon, Kids</span>
      </a>
    </div>
  </section>

  <footer>
    Juan Carlos & Maddy
  </footer>

</body>
</html>
